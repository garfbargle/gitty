name: Release Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v0.1.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Sync app version from tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          node scripts/sync-version-from-tag.mjs "$TAG"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          releaseName: Gitty ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          releaseBody: |
            Windows release for Gitty ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}.

            **Installers**
            - `Gitty_*_x64-setup.exe` — NSIS installer (recommended)
            - `Gitty_*_x64_en-US.msi` — MSI installer

            Git must be installed and available on your PATH.
          releaseDraft: false
          prerelease: false
          args: --bundles nsis,msi
